front:
  text: 羅天大醮晚朝科
  hash: sha256:d28470a0a286dc3decaac9878a97df2ef1cbed76682e821adc1a2ea6a018e7bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0163_SJB_000-090052a, image: sjb/09/090052a.png}
body:
  text: 各禮師存念如法五星髙耀瑞氣虚浮元始集神天地交周玉符寳即嘯命微幽擲火揚威奸兇無留萬魔振伏紛葩却消摧怪伐惡道炁同流神光照夜隂翳俱収萬神降格扇景乗飈群生咸遂惠遍神州鳴法鼓二十四通無上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香金童傳言散花玉女五帝直符直日香官使者各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神眞臣今晚朝陞壇行道朝謁帝眞謹奏爲入意其諸誠意具載緘謄願得太上至眞道炁靈寳瑞光下降流入臣等身中令臣所啓之誠速達徑御至眞無極大道三清上聖昊天至尊金闕玉皇上帝御前請稱法位具位某與臨壇官衆等謹同誠上啓虚無自然元始天尊無極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師上相上宰上保上傳太平下敎二十四眞人西城總眞王君太乙眞人東嶽上卿司命茅君定録保命二眞人名山洞府得道神仙三界官屬一切眞靈恭望洪慈洞回昭鑒伏念臣謬因夙慶早謝塵緣得奉上玄獲叅玄律故每省循而知幸甞思勉勵以宣勤凡有告祈不容抑塞齋誠旣切詞意庸伸仰兾玄慈洞回眞聽宣詞具如詞言灼見誠心冐瀆玄慈益深祇畏臣聞洞户三三敞瓊門於帝闕天閽九九閟玉字於宸京視不見而聽不開瞻彌髙而察彌逺超出名言之外莫究微芒不拘形器之間難窺香藹靜應下生於漢世玄元屢降於蜀都祕演眞經宻傳妙旨青宫紫府邈矣開津黄道彤墀豁然通晝聲齋莊而皈嚮一誠意以交孚感倐忽變化之神若俯仰屈伸之速於是金關啓錀玉女飛函親謁帝尊敬陳詞表上以消於災變下以度於生靈普率咸遵幽冥是頼齋官某伏念身居寰壤志在道階奉戒持齋命羽衣而宣敭經敎謝愆引咎尊師寳而開設壇場存思而升炁朝天俯伏而飛神謁帝時感紫光籠月金華浮瑞靄之馨丹焰藏星玉篆絢祥雲之彩萬籟消聲於洞壑羣飛歛翼於山林鐘磬齊敲與空歌而流響坎離黙運周内景以發輝三界齊臨五輪偕度以今靜夜行道請法衆等運茲初捻上香願此香煙騰空徑上三清之境臣等皈身皈神皈命首體投地仰依太上三尊以是捻香功德上祝當今皇帝伏願睿文星煥神武龍驤明燭四方誕布帝王之德坐觀羣動適當天地之心車同軌而書同文三邊寜靜韶盡善而武盡羙四海和平風行草靡而化無不成魚躍鳶飛而人皆自得今故燒香自皈依道尊大聖衆至眞之德得道之後保天長存以今靜夜行道請法衆等運茲二捻上香願此香煙騰空徑上三清之境臣等皈身皈神皈命首體投地仰依太上三尊以是捻香功德歸流齋官某三代宗親眷屬魂識伏願愆消慾海罪滅愛河三報豁除八垢不留於心地六根灑落五神皆得於性天煉形於流火之庭育德於童𥘉之府乗雲馭氣遊宴仙都出隂入陽逍遥聖世今故燒香自皈依經尊大聖衆至眞之德得道之後昇入無形以今靜夜行道請法衆等運茲三捻上香願此香煙騰空徑上三清之境臣等皈身皈神皈命首體投地仰依太上三尊以是捻香功德伏爲齋官某誠存一念醮設羅天謝過消災祈恩請福伏願金書紀善玉簡刋名帝與其齡年彌髙而德彌劭神介之福老者安而少者懷爰居爰處而神相其庥或止或行而天授之契歡洽門庭之内慶傳閭里之間家用平康習學冝修於爵禄人懐信義循行可襲於簮纓萬事咸亨千災永殄今故燒香自皈依師尊大聖衆至眞之德得道之後與道合眞唱方懴悔命魔三啓頌三禮重稱法位具位某與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天眞十方師尊聖衆三界官属一切威靈臣聞一以無爲得天人之旨要靜而觀復見道德之純全含洪光大而邈矣難名微妙玄通而深不可識離乎形器與物無疵要其始終與道相保臣等持心弗惠立志非堅窮恍愡而莫見其端窺徼妙而或乖其度雖欲抱黄而回紫豈能通眞以逹靈徒負職名濫行科敎齋官某浴身沐髮備禮陳儀欲欵天階爰修道範五方雲篆用収魔而束妖三級靈埸敬瞻天而望聖鳳燭揺紅而絢彩龍煙散景以流馨髙敞八門弘宣九蘥伏惟瑶京帝闕瓊苑仙都至聖元尊羣司列職九色煥飛空之駕五明浮歩景之壇神動天隨揭生源之大柄灰飛煙滅掃罪籍之繁文一慶所資無所不度上願皇圖丕衍帝業恢弘梯山航海而入貢無違外狄邊夷而朝宗不逆次兾齋官天鈞鍚祉道運儲庥祖考來寜叶詩人之雅詠神祇順相利君子之謙光綿綿丕緒以隆昌奕奕徽聲而振作門全忠孝代繼簮纓永却迍危茂膺穰簡先亡受度近逝超生或繫三塗尚淪五苦秉齋功而解脫不溺報縁准符命以化生克膺福果暨幽冥之未度偕翊衞之有勞允頼恩光俱超品秩則上明天尊大葱之澤下副臣等皈命之誠謹啓以聞發願一願靈光下燭二願道月揚輝三願恩宣九地四願誠逹天威五願眞靈具會六願道炁周圍七願天堂開敞八願地獄隳摧九願玄功普被十願駕景空飛十一願普天懷德十二願道化無爲復爐存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來晚朝陞壇行道之所自然生金液丹碧芝英百靈衆眞交會在此香火爐前當願十方仙童玉女接侍蘭筵傳臣向來所奏之誠速達徑上至眞無極大道三清上聖昊天至尊金闕玉皇上帝御前羅天火醮晚朝科
